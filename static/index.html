<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .chat-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      height: 80vh;
      min-height: 500px;
    }

    .chat-header {
      padding: 18px 24px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 18px;
      font-weight: 600;
      color: #111;
    }

    .chat-header span {
      display: inline-block;
      width: 10px; height: 10px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: #2563eb;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bubble.assistant {
      background: #f3f4f6;
      color: #111;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .bubble.thinking {
      background: #f3f4f6;
      color: #6b7280;
      align-self: flex-start;
      font-style: italic;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .input-row {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
    }

    #input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #input:focus { border-color: #2563eb; }

    #send-btn {
      padding: 10px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    #send-btn:hover:not(:disabled) { background: #1d4ed8; }
    #send-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .suggestion-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 24px 14px;
    }

    .suggestion-bar button {
      background: #eff6ff;
      color: #2563eb;
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .suggestion-bar button:hover { background: #dbeafe; }

    /* Dark mode */
    body.dark { background: #0f172a; }

    body.dark .chat-container { background: #1e293b; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }

    body.dark .chat-header { border-bottom-color: #334155; color: #f1f5f9; }

    body.dark #messages { }

    body.dark .bubble.assistant { background: #334155; color: #f1f5f9; }

    body.dark .bubble.thinking { background: #334155; color: #94a3b8; }

    body.dark .input-row { border-top-color: #334155; }

    body.dark #input {
      background: #0f172a;
      border-color: #475569;
      color: #f1f5f9;
    }

    body.dark #input:focus { border-color: #60a5fa; }

    body.dark #input::placeholder { color: #64748b; }

    body.dark .suggestion-bar button {
      background: #1e3a5f;
      color: #93c5fd;
      border-color: #2563eb;
    }

    body.dark .suggestion-bar button:hover { background: #1d4ed8; color: #fff; }

    #dark-toggle {
      margin-left: auto;
      background: none;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 16px;
      cursor: pointer;
      transition: border-color 0.2s;
      line-height: 1;
    }

    body.dark #dark-toggle { border-color: #475569; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <span></span>Sales Assistant
      <button id="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">🌺</button>
    </div>

    <div id="messages">
      <div class="bubble assistant">Hi! I can answer questions about your sales data. Try asking me about revenue, top products, regional performance, or trends.</div>
    </div>

    <div class="suggestion-bar" id="suggestions">
      <button onclick="ask('What is the total revenue?')">Total revenue</button>
      <button onclick="ask('Which product sold the most units?')">Top product</button>
      <button onclick="ask('Which region had the highest sales?')">Top region</button>
      <button onclick="ask('Show me the top 5 customers by spend')">Top customers</button>
    </div>

    <div class="input-row">
      <input id="input" placeholder="Ask about your sales data..." autocomplete="off" />
      <button id="send-btn" onclick="send()">Send</button>
    </div>
  </div>

  <script>
    let history = [];

    function ask(text) {
      document.getElementById("input").value = text;
      send();
    }

    async function send() {
      const input = document.getElementById("input");
      const msg = input.value.trim();
      if (!msg) return;

      input.value = "";
      setDisabled(true);
      document.getElementById("suggestions").style.display = "none";

      addBubble("user", msg);
      const thinking = addBubble("thinking", "Thinking...");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg, history }),
        });

        if (!res.ok) {
          const text = await res.text();
          let errorMsg;
          try {
            const errData = JSON.parse(text);
            errorMsg = errData.error || errData.detail || text;
          } catch {
            errorMsg = text || `Server error: ${res.status}`;
          }
          throw new Error(errorMsg);
        }
        const data = await res.json();
        history = data.history;

        thinking.remove();
        addBubble("assistant", data.reply);
      } catch (err) {
        thinking.remove();
        addBubble("assistant", "Sorry, something went wrong. Please try again.\n\nError: " + err.message);
        console.error(err);
      }

      setDisabled(false);
      input.focus();
    }

    function addBubble(role, text) {
      const box = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `bubble ${role}`;
      div.textContent = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
      return div;
    }

    function setDisabled(val) {
      document.getElementById("send-btn").disabled = val;
      document.getElementById("input").disabled = val;
    }

    document.getElementById("input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    function toggleDark() {
      const dark = document.body.classList.toggle("dark");
      document.getElementById("dark-toggle").textContent = dark ? "☀️" : "🌺";
      localStorage.setItem("darkMode", dark ? "1" : "0");
    }

    // Restore preference on load
    if (localStorage.getItem("darkMode") === "1") toggleDark();
  </script>
</body>
</html>
